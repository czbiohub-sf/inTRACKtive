###### Generated using `argus bootstrap` command ######
name: Create/update staging stack

on:
  push:
    branches:
      - main
    paths:
      - ".infra/common.yaml"
      - ".infra/staging/values.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  staging_stack_upsert:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      issues: write
      pull-requests: write

    steps:
      - name: Create/update staging stack
        uses: chanzuckerberg/argus-artifacts/ci/packages/create-stack@v0
        with:
          appName: intracktive
          envName: staging
          postStackDetails: false
