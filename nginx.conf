server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /api/health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
